<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
  }

  img {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* change to cover if you want it to crop and fill */
  }
</style>
</head>
<body>
  <img src="image.png" alt="Large image">
</body>
</html>
